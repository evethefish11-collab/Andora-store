function saveToCloud(col,id,data){
  if(!db)return;
  try{
    let d=data;
    if(col==="prods"){
      // Strip base64 images before saving to Firestore (too large)
      d=Object.assign({},data);
      if(d.img&&d.img.startsWith("data:"))d.img="__local__";
      if(d.imgs)d.imgs=d.imgs.map(function(im){return im&&im.startsWith("data:")?"__local__":im;});
    }
    db.collection(col).doc(String(id)).set(d);
  }catch(e){}
}
function deleteFromCloud(col,id){
  if(!db)return;
  try{db.collection(col).doc(String(id)).delete();}catch(e){}
}
async function loadFromCloud(){
  if(!db){render();return;}
  try{
    const [ps,os,prs,us,ss,cps,shs]=await Promise.all([
      db.collection("prods").get(),
      db.collection("orders").orderBy("id","desc").get(),
      db.collection("promos").get(),
      db.collection("users").get(),
      db.collection("settings").doc("main").get(),
      db.collection("coupons").get(),
      db.collection("shops").get()
    ]);
    if(!ps.empty){
      prods=ps.docs.map(function(d){
        const p=d.data();
        // Restore images from localStorage
        try{
          const stored=localStorage.getItem("img_"+p.id);
          if(stored){const imgs=JSON.parse(stored);p.img=imgs.img||p.img;p.imgs=imgs.imgs||p.imgs;}
        }catch(e){}
        return p;
      });
    }
    if(!os.empty)orders=os.docs.map(d=>d.data());
    if(!prs.empty)promos=prs.docs.map(d=>d.data());
    if(!us.empty)users=us.docs.map(d=>d.data());
    if(ss.exists&&ss.data().qrImg)qrImg=ss.data().qrImg;
    if(cps&&!cps.empty)coupons=cps.docs.map(d=>d.data());
    if(shs&&!shs.empty)shops=shs.docs.map(d=>d.data());
    render();
  }catch(e){console.warn("Cloud load failed:",e);}
}
function saveAll(){
  try{
    prods.forEach(p=>saveToCloud("prods",p.id,p));
    users.forEach(u=>saveToCloud("users",u.id,u));
    orders.forEach(o=>saveToCloud("orders",o.id,o));
    promos.forEach(p=>saveToCloud("promos",p.id,p));
  coupons.forEach(cp=>saveToCloud("coupons",cp.id,cp));
  shops.forEach(s=>saveToCloud("shops",s.id,s));
  }catch(e){}
}

// ── DOM HELPERS ────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  // Set type first on inputs for iOS compatibility
  if(tag==="input"&&attrs&&attrs.type)e.type=attrs.type;
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(v==null||v===false)return;
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else if(k==="type"&&tag==="input")e.type=v;
    else e.setAttribute(k,v);
  });
  children.flat(5).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return e;
}
function toast(msg){
  let t=$("toast(");
  if(!t){t=el(")div",{id:"toast(",className:")toast("});document.body.appendChild(t);}
  t.textContent=msg;t.classList.add(")on");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("on"),2400);
}
function closeOv(){const ov=$("ov");if(ov)ov.remove();}
function showOv(content,onbg=closeOv){
  closeOv();
  const ov=el("div",{id:"ov",className:"ov",onclick:e=>{if(e.target.id==="ov")onbg();}},content);
  document.body.appendChild(ov);
}
function getPromoMap(){
  const m={};
  promos.forEach(pr=>pr.prodIds.forEach(id=>{
    const p=prods.find(x=>x.id===id);
    if(p&&!m[id])m[id]={price:Math.round(p.price*(1-pr.pct/100)),pct:pr.pct};
  }));
  return m;
}



// ── IMAGE RESIZE ──────────────────────────────────────────────────
function resizeImage(file, maxW, maxH, quality, cb){
  const r=new FileReader();
  r.onload=function(e){
    const img=new Image();
    img.onload=function(){
      let w=img.width, h=img.height;
      if(w>maxW||h>maxH){
        const ratio=Math.min(maxW/w, maxH/h);
        w=Math.round(w*ratio);
        h=Math.round(h*ratio);
      }
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      cb(canvas.toDataURL("image/jpeg", quality));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

function render(){
  clearTimeout(window._fbTimer);
  window._fbTimer=setTimeout(saveAll,2000);
  const app=$("app");if(!app)return;
  app.innerHTML="";
  app.appendChild(buildNav());
  const page=el("div",{className:"page"});
  if(view==="shop")page.appendChild(buildShop());
  else if(view==="admin"&&(user&&(user.role==="admin"||user.role==="shop")))page.appendChild(buildAdmin());
  else if(view==="profile")page.appendChild(buildProfile());
  app.appendChild(page);
  app.appendChild(buildCart());
}

// ── SHOP ───────────────────────────────────────────────────────────
function buildShop(){
  const PM=getPromoMap();
  const fil=prods.filter(p=>{
    if(fCat!==0&&p.cat!==CATS[fCat])return false;
    if(fShop&&p.shopId!==fShop)return false;
    if(fAv==="ready"&&!rdy(p))return false;
    if(fAv==="preorder"&&rdy(p))return false;
    if(fPromo&&!PM[p.id])return false;
    if(fCo&&!(p.colors||[]).includes(fCo))return false;
    if(fSi&&!(p.sizes||[]).includes(fSi))return false;
    return true;
  });
  if(fSort==="new")fil.sort((a,b)=>b.id-a.id);
  else if(fSort==="price_asc")fil.sort((a,b)=>a.price-b.price);
  else if(fSort==="price_desc")fil.sort((a,b)=>b.price-a.price);

  const allCo=[...new Set(prods.flatMap(p=>p.colors||[]))];
  const allSi=[...new Set(prods.flatMap(p=>p.sizes||[]))];
  const dd={flex:"1",minWidth:0,padding:"9px 8px",borderRadius:"10px",border:"1.5px solid #9A7ABE",background:"#fff",color:"#1A1020",fontSize:".78rem",fontFamily:"inherit",cursor:"pointer",outline:"none"};
  const catSel=el("select",{style:dd,onchange:e=>{
    const v=e.target.value;
    if(v==="new"){fSort="new";fCat=0;}else if(v==="price_asc"){fSort="price_asc";fCat=0;}
    else if(v==="price_desc"){fSort="price_desc";fCat=0;}else{fCat=Number(v);fSort="new";}
    fPromo=false;fCo="";fSi="";render();
  }},el("option",{value:"0"},"ทั้งหมด"),el("option",{value:"new"},"ใหม่ล่าสุด"),el("option",{value:"price_asc"},"ราคา ต่ำ→สูง"),el("option",{value:"price_desc"},"ราคา สูง→ต่ำ"),
    el("optgroup",{label:"--- หมวดหมู่ ---"},...CATS.slice(1).map((c,i)=>{const o=el("option",{value:String(i+1)},c);if(fCat===i+1&&fSort==="new")o.selected=true;return o;}))
  );
  if(fSort==="new"&&fCat===0)catSel.value="new";
  else if(fSort==="price_asc")catSel.value="price_asc";
  else if(fSort==="price_desc")catSel.value="price_desc";
  else catSel.value=String(fCat);
  const coSel=el("select",{style:dd,onchange:e=>{fCo=e.target.value;render();}},el("option",{value:""},"🎨 สีทั้งหมด"),...allCo.map(c=>{const o=el("option",{value:c},c);if(fCo===c)o.selected=true;return o;}));
  const siSel=el("select",{style:dd,onchange:e=>{fSi=e.target.value;render();}},el("option",{value:""},"📏 ขนาดทั้งหมด"),...allSi.map(s=>{const o=el("option",{value:s},s);if(fSi===s)o.selected=true;return o;}));

  return el("div",null,
    buildMemberBanner(),
    el("div",{style:{padding:"6px 14px 4px",display:"flex",gap:"7px"}},catSel,coSel,siSel),
    el("div",{className:"chips",style:{paddingTop:"4px"}},
      [["all","ทั้งหมด"],["ready","⚡ พร้อมส่ง"],["preorder","📦 พรีออเดอร์"]].map(([v,lb])=>el("button",{className:"chip"+(fAv===v?" on":""),onclick:()=>{fAv=v;render();}},lb)),
      ...(shops.length>0?shops.map(sh=>el("button",{className:"chip"+(fShop===sh.id?" on":""),style:{borderColor:sh.color||"#8B6AA8",color:fShop===sh.id?"#fff":(sh.color||"#7B4FA0"),background:fShop===sh.id?(sh.color||"#7B4FA0"):"#fff"},onclick:()=>{fShop=fShop===sh.id?null:sh.id;render();}},sh.emoji||"🏪"+" "+sh.name)):[]),
      promos.length>0?el("button",{className:"chip promo"+(fPromo?" on":""),onclick:()=>{fPromo=!fPromo;fCat=0;render();}},"🎁 โปรโมชั่น"):null
    ),
    fil.length===0?el("div",{style:{textAlign:"center",padding:"32px",color:"#8A7A9E"}},"ไม่พบสินค้า"):el("div",{className:"grid"},fil.map(p=>buildCard(p,PM))),
    el("div",{style:{margin:"16px 14px 0",background:D,borderRadius:"14px",padding:"20px 16px"}},
      el("div",{style:{fontSize:".56rem",letterSpacing:".14em",textTransform:"uppercase",color:"#8B6AA8",marginBottom:"8px"}},"วิธีสั่งซื้อ"),
      el("div",{style:{display:"grid",gap:"6px",marginBottom:"14px"}},
        ...["เลือกสินค้า → เลือกสีและขนาด","กด 🛒 เพิ่มลงตะกร้า","กดชำระเงิน → สแกน QR","ส่งสลิป + ข้อมูลจัดส่ง","⚡ พร้อมส่ง: รับสินค้า 1-2 วัน | 📦 พรีออเดอร์: 10-15 วัน","🔄 ถ้าไม่พอใจ คืนสินค้าและรับเงินคืนได้ภายใน 3 วัน"].map((s,i)=>el("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
          el("span",{style:{width:"20px",height:"20px",borderRadius:"50%",background:P,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".65rem",fontWeight:"700",flexShrink:"0"}},String(i+1)),
          el("span",{style:{fontSize:".8rem",color:"rgba(243,240,247,.8)"}},s))),
